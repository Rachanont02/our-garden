<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Scrapbook</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Kalam:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4ede0;background-image:radial-gradient(circle at 20% 30%,rgba(139,111,82,.05) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(139,111,82,.05) 0%,transparent 50%);font-family:'Kalam',cursive;color:#3a2e20;min-height:100vh;padding:40px 30px 80px;position:relative}
  .hd{text-align:center;margin-bottom:30px;position:relative}
  .hd h1{font-family:'Caveat',cursive;font-weight:600;font-size:62px;color:#8b3a3a;transform:rotate(-1deg)}
  .hd .s{font-family:'Special Elite',monospace;font-size:13px;letter-spacing:.1em;color:#6a5340;margin-top:4px}
  .tape{display:inline-block;background:rgba(255,200,150,.5);padding:3px 14px;border:.5px solid rgba(0,0,0,.1);font-size:10px;letter-spacing:.1em;transform:rotate(-2deg);margin-bottom:6px}
  .board{position:relative;min-height:500px}
  .item{position:absolute;background:#fff;padding:12px;box-shadow:3px 4px 8px rgba(0,0,0,.15),0 0 0 .5px rgba(0,0,0,.08)}
  .polaroid{width:180px}
  .polaroid .p{aspect-ratio:1;background:linear-gradient(135deg,#d4a58a,#e6c5a8)}
  .polaroid .cap{font-family:'Caveat',cursive;font-size:18px;text-align:center;padding:8px 4px 0;color:#3a2e20}
  .note{width:200px;background:#fffde0;padding:18px;font-family:'Caveat',cursive;font-size:18px;color:#3a2e20}
  .note .d{font-family:'Special Elite',monospace;font-size:10px;color:#8a7560;margin-bottom:6px}
  .tape-top{position:absolute;top:-8px;left:50%;transform:translateX(-50%) rotate(-3deg);width:50px;height:14px;background:rgba(220,180,100,.6);border:.5px solid rgba(0,0,0,.1)}
  .num{font-family:'Caveat',cursive;font-weight:700;font-size:100px;color:#8b3a3a;line-height:.9}
  .numcard{width:220px;text-align:center;padding:24px;background:#fff0e8}
  .numl{font-family:'Special Elite',monospace;font-size:11px;letter-spacing:.15em;color:#6a5340;margin-top:4px}
</style></head>
<body>
<div class="hd">
  <div class="tape">PRIVATE · SINCE 2025</div>
  <h1>our little scrapbook</h1>
  <div class="s">~ a collection of us ~</div>
</div>
<div class="board">
  <div class="item polaroid" style="left:3%;top:0;transform:rotate(-3deg)"><div class="tape-top"></div><div class="p" style="background:linear-gradient(135deg,#d4a58a,#e6c5a8)"></div><div class="cap">first trip ♡</div></div>
  <div class="item numcard" style="left:28%;top:20px;transform:rotate(2deg)"><div class="tape-top"></div><div class="num">318</div><div class="numl">DAYS TOGETHER</div></div>
  <div class="item note" style="right:5%;top:10px;transform:rotate(3deg)"><div class="tape-top"></div><div class="d">APR · 21 · 2026</div>you make ordinary tuesdays feel like something<br/>worth keeping ♡</div>
  <div class="item polaroid" style="left:8%;top:260px;transform:rotate(4deg)"><div class="tape-top"></div><div class="p" style="background:linear-gradient(135deg,#a8c4a0,#c5d4b0)"></div><div class="cap">sunday morning</div></div>
  <div class="item" style="left:30%;top:280px;transform:rotate(-2deg);width:200px;padding:20px;background:#f8e0d8"><div class="tape-top"></div><div style="font-family:'Caveat',cursive;font-size:22px">menu</div><div style="font-size:13px;line-height:1.9;margin-top:6px;font-family:'Kalam'">♡ memories<br/>♡ love letters<br/>♡ our songs<br/>♡ the map<br/>♡ dream list</div></div>
  <div class="item polaroid" style="right:3%;top:290px;transform:rotate(-4deg)"><div class="tape-top"></div><div class="p" style="background:linear-gradient(135deg,#c4b5d4,#d8cde4)"></div><div class="cap">you, laughing</div></div>
</div>
</body></html>
