<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Soft Pink</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(180deg,#fde0ea,#ffeef4);font-family:'Quicksand',sans-serif;color:#5a3244;min-height:100vh;padding:40px 30px 80px;position:relative;overflow-x:hidden}
  .heart-bg{position:absolute;font-size:22px;color:rgba(232,90,145,.2)}
  .title{font-family:'Caveat Brush',cursive;font-size:58px;color:#e85a91;text-align:center}
  .sub{font-family:'Dancing Script',cursive;font-size:22px;color:#8b3a5a;text-align:center;margin-top:8px;opacity:.85}
  .counter{background:#fff;border-radius:28px;padding:36px;margin:30px auto;max-width:440px;text-align:center;box-shadow:0 10px 40px rgba(232,90,145,.15)}
  .bignum{font-family:'Caveat Brush',cursive;font-size:110px;color:#e85a91;line-height:1}
  .biglbl{font-size:14px;color:#a07a8a;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;max-width:680px;margin:0 auto}
  .card{background:#fff;border-radius:24px;padding:30px 24px;text-align:center;box-shadow:0 8px 30px rgba(232,90,145,.12)}
  .ico{font-size:42px;margin-bottom:10px}
  .ct{font-family:'Caveat Brush',cursive;font-size:26px;color:#e85a91;margin-bottom:6px}
  .cd{font-size:13px;color:#a07a8a}
  .ch{font-size:22px;color:#f4a9c3;margin-top:14px}
</style></head>
<body>
<div class="heart-bg" style="top:10%;left:8%">♡</div>
<div class="heart-bg" style="top:30%;right:10%;font-size:16px">♥</div>
<div class="heart-bg" style="bottom:20%;left:15%">♡</div>
<div class="heart-bg" style="bottom:10%;right:20%;font-size:18px">♥</div>
<div class="title">Menu of Our Love</div>
<div class="sub">♡ Together Forever ♡</div>
<div class="counter">
  <div class="bignum">318</div>
  <div class="biglbl">days together</div>
</div>
<div class="grid">
  <div class="card"><div class="ico">🖼️</div><div class="ct">Our Memories</div><div class="cd">Every precious moment 💕</div><div class="ch">♡</div></div>
  <div class="card"><div class="ico">📅</div><div class="ct">Love Calendar</div><div class="cd">Days of our love story 💕</div><div class="ch">♡</div></div>
  <div class="card"><div class="ico">💌</div><div class="ct">Love Notes</div><div class="cd">Sweet messages for you</div><div class="ch">♡</div></div>
  <div class="card"><div class="ico">🎵</div><div class="ct">Our Playlist</div><div class="cd">Songs that are us</div><div class="ch">♡</div></div>
</div>
</body></html>
