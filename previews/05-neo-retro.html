<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Neo Retro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#fff5ea;font-family:'Space Grotesk',sans-serif;color:#1a1a1a;min-height:100vh;padding:40px 30px 80px;position:relative}
  .tag{display:inline-block;padding:6px 14px;background:#ff3a5c;color:#fff5ea;font-size:11px;font-weight:700;letter-spacing:.14em;border-radius:4px;transform:rotate(-2deg);border:2px solid #1a1a1a;box-shadow:3px 3px 0 #1a1a1a}
  .hero{margin:30px 0 40px;position:relative}
  .hero h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:88px;line-height:.92;letter-spacing:-.04em}
  .hero h1 span{background:#ffd84a;padding:0 10px;display:inline-block;border:3px solid #1a1a1a;box-shadow:5px 5px 0 #1a1a1a}
  .hero .scribble{font-family:'Caveat',cursive;font-size:28px;color:#ff3a5c;transform:rotate(-4deg);display:inline-block;margin-top:10px}
  .row{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:20px}
  .big{background:#ff3a5c;color:#fff5ea;padding:30px;border:3px solid #1a1a1a;box-shadow:6px 6px 0 #1a1a1a}
  .bn{font-weight:700;font-size:90px;line-height:1}
  .bl{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-top:6px}
  .side{background:#ffd84a;padding:24px;border:3px solid #1a1a1a;box-shadow:6px 6px 0 #1a1a1a;display:flex;flex-direction:column;justify-content:space-between}
  .side h3{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .side p{font-size:13px;margin-top:6px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .card{background:#fff;padding:22px 20px;border:3px solid #1a1a1a;box-shadow:4px 4px 0 #1a1a1a}
  .card:nth-child(2){background:#c4f4a8}
  .card:nth-child(3){background:#a8c4f4}
  .ci{font-size:30px;margin-bottom:8px}
  .ct{font-weight:700;font-size:18px;letter-spacing:-.01em}
  .cd{font-size:12px;margin-top:4px;color:#555}
  .arr{font-weight:700;font-size:18px;margin-top:14px}
</style></head>
<body>
<div class="tag">★ PRIVATE ACCESS ★</div>
<div class="hero"><h1>US &amp;<br/>US <span>♥</span></h1><div class="scribble">~ 318 days strong ~</div></div>
<div class="row">
  <div class="big"><div class="bn">318</div><div class="bl">DAYS · TOGETHER</div></div>
  <div class="side"><div><h3>Next up:</h3><p>1 year anniversary — <b>47 days</b></p></div><div class="arr">→</div></div>
</div>
<div class="grid">
  <div class="card"><div class="ci">📷</div><div class="ct">MEMORIES</div><div class="cd">194 photos</div><div class="arr">→</div></div>
  <div class="card"><div class="ci">✉</div><div class="ct">LETTERS</div><div class="cd">12 notes</div><div class="arr">→</div></div>
  <div class="card"><div class="ci">♪</div><div class="ct">PLAYLIST</div><div class="cd">42 songs</div><div class="arr">→</div></div>
</div>
</body></html>
