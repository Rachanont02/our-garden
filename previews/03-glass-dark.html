<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Moonlight Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(ellipse at top,#2a1f3d 0%,#14101f 55%,#0a0812 100%);font-family:'Inter',sans-serif;color:#f0e8d4;min-height:100vh;padding:50px 40px 80px;position:relative;overflow:hidden}
  body::before{content:'';position:absolute;top:-20%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(212,175,100,.2),transparent 65%);filter:blur(40px)}
  body::after{content:'';position:absolute;bottom:-10%;left:-5%;width:350px;height:350px;background:radial-gradient(circle,rgba(180,100,180,.18),transparent 65%);filter:blur(40px)}
  .wrap{position:relative;z-index:1;max-width:780px;margin:0 auto}
  .hd{text-align:center;margin-bottom:40px}
  .hd .s{font-size:11px;letter-spacing:.25em;color:#d4af64;text-transform:uppercase}
  .hd h1{font-family:'Gloock',serif;font-size:56px;margin-top:10px;background:linear-gradient(180deg,#f4e8c8,#d4af64);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .counter{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(212,175,100,.25);border-radius:24px;padding:40px;text-align:center;margin-bottom:24px;box-shadow:0 20px 60px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1)}
  .bn{font-family:'Gloock',serif;font-size:96px;background:linear-gradient(180deg,#f4e8c8,#d4af64);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
  .bl{font-size:12px;letter-spacing:.2em;color:#b8a280;text-transform:uppercase;margin-top:8px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .card{background:rgba(255,255,255,.05);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:26px 22px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .ci{font-size:32px;margin-bottom:10px}
  .ct{font-family:'Gloock',serif;font-size:22px;color:#f4e8c8}
  .cd{font-size:12px;color:#a69882;margin-top:6px;line-height:1.5}
  .cl{font-size:10px;color:#d4af64;letter-spacing:.2em;text-transform:uppercase;margin-top:14px;padding-top:14px;border-top:1px solid rgba(212,175,100,.2)}
</style></head>
<body>
<div class="wrap">
  <div class="hd"><div class="s">✦ Our Private Place ✦</div><h1>Us, by moonlight</h1></div>
  <div class="counter"><div class="bn">318</div><div class="bl">days with you</div></div>
  <div class="grid">
    <div class="card"><div class="ci">🌙</div><div class="ct">Memories</div><div class="cd">Every moment, softly lit.</div><div class="cl">194 PHOTOS →</div></div>
    <div class="card"><div class="ci">✉</div><div class="ct">Letters</div><div class="cd">Words for when you need them.</div><div class="cl">12 LETTERS →</div></div>
    <div class="card"><div class="ci">☽</div><div class="ct">Our Story</div><div class="cd">Every chapter, kept safe.</div><div class="cl">6 MILESTONES →</div></div>
    <div class="card"><div class="ci">♪</div><div class="ct">Soundtrack</div><div class="cd">Songs we belong to.</div><div class="cl">42 SONGS →</div></div>
  </div>
</div>
</body></html>
