<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Couple Memory — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #efece5; color: #1a1a1a;
    font-family: Inter, sans-serif; }

  /* App shell */
  .app { min-height: 100vh; padding: 28px 28px 120px; }

  .masthead {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 4px 18px; border-bottom: 1px solid rgba(0,0,0,0.12);
    margin-bottom: 24px;
  }
  .masthead .title {
    font-family: 'Caveat', cursive; font-size: 34px; line-height: 1;
  }
  .masthead .sub {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; color: #888; text-transform: uppercase;
  }

  /* Variation tab bar */
  .tabs {
    display: flex; gap: 8px; padding: 14px 0 22px; flex-wrap: wrap;
  }
  .tab {
    padding: 10px 18px;
    background: #f8f6ef;
    border: 1.25px solid #2a2a28;
    border-radius: 999px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.12s, transform 0.12s;
  }
  .tab:hover { transform: translateY(-1px); }
  .tab.active { background: #1a1a1a; color: #faf9f5; }
  .tab .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
    padding: 2px 6px; background: rgba(0,0,0,0.08); border-radius: 4px;
  }
  .tab.active .num { background: rgba(255,255,255,0.18); }

  /* Page tab bar (within a variation) */
  .pages {
    display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap;
    padding: 10px 14px;
    background: #f8f6ef;
    border: 1px dashed rgba(0,0,0,0.25);
    border-radius: 10px;
  }
  .page-tab {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
    color: #555;
  }
  .page-tab:hover { background: rgba(0,0,0,0.04); color: #1a1a1a; }
  .page-tab.active { background: #1a1a1a; color: #faf9f5; }

  /* Canvas — the wireframe artboard */
  .canvas {
    background: #faf9f5;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.04);
    min-height: 600px;
  }

  .blurb {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 15px;
    color: #777;
    margin: 0 4px 18px;
    max-width: 720px;
    line-height: 1.5;
  }

  .density-compact .canvas { transform-origin: top left; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="variation-scrapbook.jsx"></script>
  <script type="text/babel" src="variation-editorial.jsx"></script>
  <script type="text/babel" src="variation-dashboard.jsx"></script>
  <script type="text/babel" src="variation-story.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "variation": "scrapbook",
      "page": "songs",
      "accent": "peach",
      "showAnnotations": true
    }/*EDITMODE-END*/;

    const VARIATIONS = [
      { id: 'scrapbook', num: '01', name: 'Scrapbook',
        blurb: 'Playful collage. Tilted photos, tape, handwritten type — everything feels like a keepsake pulled out of a drawer.' },
      { id: 'editorial', num: '02', name: 'Editorial',
        blurb: 'A private magazine. Big serif headlines, mono captions, generous whitespace. Calm and quiet.' },
      { id: 'dashboard', num: '03', name: 'Dashboard',
        blurb: 'Counter-first. Soft pastel widget cards with the days-together number front and center, everything else summarized around it.' },
      { id: 'story', num: '04', name: 'Story-scroll',
        blurb: 'A single long book. Every feature is a chapter in one scrolling narrative — read from start to finish.' },
    ];

    const PAGES = [
      { id: 'home', name: 'Home' },
      { id: 'timeline', name: 'Story' },
      { id: 'gallery', name: 'Photos' },
      { id: 'letters', name: 'Letters' },
      { id: 'bucket', name: 'List' },
      { id: 'songs', name: 'Songs' },
      { id: 'map', name: 'Map' },
    ];

    const PAGE_MAP = {
      scrapbook: {
        home: ScrapbookHome, timeline: ScrapbookTimeline, gallery: ScrapbookGallery,
        letters: ScrapbookLetters, bucket: ScrapbookBucket, songs: ScrapbookSongs, map: ScrapbookMap,
      },
      editorial: {
        home: EditorialHome, timeline: EditorialTimeline, gallery: EditorialGallery,
        letters: EditorialLetters, bucket: EditorialBucket, songs: EditorialSongs, map: EditorialMap,
      },
      dashboard: {
        home: DashHome, timeline: DashTimeline, gallery: DashGallery,
        letters: DashLetters, bucket: DashBucket, songs: DashSongs, map: DashMap,
      },
      story: {
        home: StoryHome,
        timeline: () => <StoryPlaceholder title="Story" />,
        gallery: () => <StoryPlaceholder title="Photos" />,
        letters: () => <StoryPlaceholder title="Letters" />,
        bucket: () => <StoryPlaceholder title="The list" />,
        songs: () => <StoryPlaceholder title="Songs" />,
        map: () => <StoryPlaceholder title="The map" />,
      },
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const Variation = PAGE_MAP[t.variation] || PAGE_MAP.scrapbook;
      const PageComp = Variation[t.page] || Variation.home;
      const activeVar = VARIATIONS.find(v => v.id === t.variation) || VARIATIONS[0];

      return (
        <div className="app">
          <SketchyDefs />

          <div className="masthead">
            <div>
              <div className="title">couple memory · wireframes</div>
              <div className="blurb" style={{ margin: '6px 0 0' }}>
                Four directions for a private couple's site — pastel, romantic, low-fi. Toggle variations and pages below.
              </div>
            </div>
            <div className="sub">4 DIRECTIONS · 7 PAGES · APR 2026</div>
          </div>

          {/* Variation tabs */}
          <div className="tabs">
            {VARIATIONS.map(v => (
              <div key={v.id}
                   className={'tab' + (t.variation === v.id ? ' active' : '')}
                   onClick={() => setTweak('variation', v.id)}>
                <span className="num">{v.num}</span>
                <span>{v.name}</span>
              </div>
            ))}
          </div>

          <div className="blurb">{activeVar.blurb}</div>

          {/* Page tabs */}
          <div className="pages">
            {PAGES.map(p => (
              <div key={p.id}
                   className={'page-tab' + (t.page === p.id ? ' active' : '')}
                   onClick={() => setTweak('page', p.id)}>
                {p.name}
              </div>
            ))}
          </div>

          {/* Canvas */}
          <div className="canvas">
            <PageComp />
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Direction" />
            <TweakSelect label="Variation" value={t.variation}
              options={VARIATIONS.map(v => ({ value: v.id, label: `${v.num} · ${v.name}` }))}
              onChange={(v) => setTweak('variation', v)} />
            <TweakSelect label="Page" value={t.page}
              options={PAGES.map(p => ({ value: p.id, label: p.name }))}
              onChange={(v) => setTweak('page', v)} />
            <TweakSection label="Shortcuts" />
            <div style={{ fontSize: 11, color: '#777', lineHeight: 1.6 }}>
              Click tabs at the top to switch variations.<br/>
              Each variation is a full 7-page flow.
            </div>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
